name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test (iOS 17+ / Swift 6)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16+
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app || sudo xcode-select -s /Applications/Xcode_16.app
          xcodebuild -version
          swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build -c debug

      - name: Test (PaletteKitTests only — benchmarks opt-in)
        run: swift test --filter PaletteKitTests
