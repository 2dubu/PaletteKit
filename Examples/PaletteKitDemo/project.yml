name: PaletteKitDemo
options:
  bundleIdPrefix: com.paletteKit.demo
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  PaletteKit:
    path: ../..

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    ENABLE_MODULE_VERIFIER: "YES"
    GENERATE_INFOPLIST_FILE: "NO"

targets:
  PaletteKitDemo:
    type: application
    platform: iOS
    sources:
      - path: PaletteKitDemo
    dependencies:
      - package: PaletteKit
      - package: PaletteKit
        product: PaletteKitInsights
    info:
      path: PaletteKitDemo/Info.plist
      properties:
        NSPhotoLibraryUsageDescription: "Pick a photo to extract a color palette."
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.paletteKit.demo.PaletteKitDemo
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "NO"
        CODE_SIGN_STYLE: Automatic
